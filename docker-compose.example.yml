services:
  monitor:
    build: .
    container_name: mysql-monitor
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATA_DIR: /app/data
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
